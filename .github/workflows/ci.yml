name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    name: Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      EXPO_NO_TELEMETRY: 1

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint source and documentation
        run: pnpm lint

      - name: Type-check workspaces and tests
        run: pnpm typecheck

      - name: Run Jest unit and property tests
        run: pnpm test:ci

      - name: Test parity tooling
        run: pnpm test:tooling

      - name: Validate upstream parity manifest
        env:
          PARITY_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: pnpm parity:check --results coverage/parity/jest.parity.json

      - name: Build package
        run: pnpm build

      - name: Check public API declarations
        run: pnpm api:check

      - name: Export Expo gallery
        run: pnpm example:export

  package-artifact:
    name: Package artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Pack and inspect package once
        run: node scripts/inspect-package.mjs --output "$RUNNER_TEMP/package/chessboard-native.tgz"

      - name: Upload inspected package
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chessboard-native-package
          path: ${{ runner.temp }}/package/chessboard-native.tgz
          compression-level: 0
          if-no-files-found: error
          retention-days: 7

  packed-expo:
    name: Packed / Expo
    needs:
      - baseline
      - package-artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    env:
      CI: 1
      EXPO_NO_TELEMETRY: 1
      NODE_ENV: production

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: apps/example/package.json

      - name: Install pinned Android SDK packages
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Download inspected package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.package-artifact.outputs.artifact-id }}
          path: ${{ runner.temp }}/package

      - name: Prepare isolated Expo consumer
        run: >-
          node scripts/smoke-packed.mjs
          --consumer expo
          --archive "$RUNNER_TEMP/package/chessboard-native.tgz"
          --destination "$RUNNER_TEMP/packed-expo"

      - name: Export Android and iOS production bundles
        working-directory: ${{ runner.temp }}/packed-expo
        run: npm run export:native

      - name: Generate clean Expo Android project
        working-directory: ${{ runner.temp }}/packed-expo
        run: npx expo prebuild --platform android --no-install --clean

      - name: Build Expo Android Release
        working-directory: ${{ runner.temp }}/packed-expo/android
        run: ./gradlew :app:assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

  packed-bare-android:
    name: Native / Android Release
    needs:
      - baseline
      - package-artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            apps/native-harness/android/**/*.gradle*
            apps/native-harness/android/gradle/wrapper/gradle-wrapper.properties

      - name: Install pinned Android SDK packages
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "emulator" "system-images;android-35;aosp_atd;x86_64"

      - name: Install pinned emulator runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes libpulse0

      - name: Pin Android emulator 36.3.10 for accessibility audit
        env:
          EMULATOR_BUILD_ID: '14472402'
          EMULATOR_SHA256: c8ab9ffbc4c2d11c02e06e81a9d9f81970177dc5ab599e3a30eb08a4a5496a67
        run: |
          archive="$RUNNER_TEMP/emulator-linux_x64-$EMULATOR_BUILD_ID.zip"
          curl --fail --location --retry 3 \
            --output "$archive" \
            "https://redirector.gvt1.com/edgedl/android/repository/emulator-linux_x64-$EMULATOR_BUILD_ID.zip"
          echo "$EMULATOR_SHA256  $archive" | sha256sum --check

          mv "$ANDROID_HOME/emulator" "$RUNNER_TEMP/emulator-current"
          unzip -q "$archive" -d "$ANDROID_HOME"
          cp "$RUNNER_TEMP/emulator-current/package.xml" "$ANDROID_HOME/emulator/package.xml"
          sed -E -i \
            's#<revision><major>[0-9]+</major><minor>[0-9]+</minor><micro>[0-9]+</micro></revision>#<revision><major>36</major><minor>3</minor><micro>10</micro></revision>#' \
            "$ANDROID_HOME/emulator/package.xml"
          grep -q '<revision><major>36</major><minor>3</minor><micro>10</micro></revision>' "$ANDROID_HOME/emulator/package.xml"

          emulator_version_file="$RUNNER_TEMP/emulator-version.txt"
          if ! "$ANDROID_HOME/emulator/emulator" -version >"$emulator_version_file" 2>&1; then
            cat "$emulator_version_file"
            exit 1
          fi
          emulator_version=$(cat "$emulator_version_file")
          echo "$emulator_version"
          grep -Fq 'Android emulator version 36.3.10.0' <<<"$emulator_version"
          grep -Fq "(build_id $EMULATOR_BUILD_ID)" <<<"$emulator_version"

      - name: Enable KVM for the Android accessibility emulator
        run: sudo chmod 666 /dev/kvm

      - name: Verify Android emulator acceleration
        run: $ANDROID_HOME/emulator/emulator -accel-check

      - name: Download inspected package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.package-artifact.outputs.artifact-id }}
          path: ${{ runner.temp }}/package

      - name: Prepare isolated bare consumer
        run: >-
          node scripts/smoke-packed.mjs
          --consumer native
          --archive "$RUNNER_TEMP/package/chessboard-native.tgz"
          --destination "$RUNNER_TEMP/packed-native"

      - name: Build Android Release harness
        working-directory: ${{ runner.temp }}/packed-native/android
        run: ./gradlew :app:assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Run Android accessibility audit
        working-directory: ${{ runner.temp }}/packed-native
        shell: bash
        run: |
          avd_name="chessboard_api35"
          avdmanager="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          adb="$ANDROID_HOME/platform-tools/adb"
          audit_log="$RUNNER_TEMP/android-accessibility-audit.log"
          emulator_log="$RUNNER_TEMP/android-emulator.log"
          export ANDROID_AVD_HOME="$RUNNER_TEMP/android-avd"
          export ANDROID_SERIAL="emulator-5554"
          mkdir -p "$ANDROID_AVD_HOME"

          printf 'no\n' | "$avdmanager" create avd \
            --force \
            --name "$avd_name" \
            --package "system-images;android-35;aosp_atd;x86_64" \
            --device "pixel_2"

          avd_config="$ANDROID_AVD_HOME/$avd_name.avd/config.ini"
          sed -E -i.bak \
            's/^disk\.dataPartition\.size=.*/disk.dataPartition.size=2G/' \
            "$avd_config"
          rm "$avd_config.bak"
          grep -Fxq 'disk.dataPartition.size=2G' "$avd_config"
          [[ "$(grep -c '^disk\.dataPartition\.size=' "$avd_config")" -eq 1 ]]

          available_avds=$("$ANDROID_HOME/emulator/emulator" -list-avds)
          printf '%s\n' "$available_avds"
          grep -Fxq "$avd_name" <<<"$available_avds"

          "$adb" start-server
          "$ANDROID_HOME/emulator/emulator" \
            -avd "$avd_name" \
            -port 5554 \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -no-snapshot \
            -gpu swiftshader_indirect \
            -accel on \
            >"$emulator_log" 2>&1 &
          emulator_pid=$!

          cleanup_emulator() {
            set +e
            "$adb" -s "$ANDROID_SERIAL" emu kill >/dev/null 2>&1
            kill "$emulator_pid" >/dev/null 2>&1
            wait "$emulator_pid" >/dev/null 2>&1
          }
          trap cleanup_emulator EXIT

          boot_deadline=$((SECONDS + 300))
          boot_completed=""
          while (( SECONDS < boot_deadline )); do
            if ! kill -0 "$emulator_pid" 2>/dev/null; then
              echo "Android emulator exited before completing boot."
              cat "$emulator_log"
              exit 1
            fi
            boot_completed=$("$adb" -s "$ANDROID_SERIAL" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r' || true)
            if [[ "$boot_completed" == "1" ]]; then
              break
            fi
            sleep 2
          done

          if [[ "$boot_completed" != "1" ]]; then
            echo "Android emulator did not complete boot within 300 seconds."
            cat "$emulator_log"
            exit 1
          fi

          "$adb" -s "$ANDROID_SERIAL" shell settings put global window_animation_scale 0
          "$adb" -s "$ANDROID_SERIAL" shell settings put global transition_animation_scale 0
          "$adb" -s "$ANDROID_SERIAL" shell settings put global animator_duration_scale 0
          "$adb" -s "$ANDROID_SERIAL" shell cmd package list packages >/dev/null
          "$adb" devices -l

          npm run android:accessibility -- -PreactNativeArchitectures=x86_64 2>&1 | tee "$audit_log"

      - name: Upload Android accessibility audit results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-accessibility-audit
          path: |
            ${{ runner.temp }}/android-emulator.log
            ${{ runner.temp }}/android-accessibility-audit.log
            ${{ runner.temp }}/packed-native/android/app/build/reports/androidTests
            ${{ runner.temp }}/packed-native/android/app/build/outputs/androidTest-results
          if-no-files-found: ignore
          retention-days: 7

  packed-bare-ios:
    name: Native / iOS Release
    needs:
      - baseline
      - package-artifact
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Download inspected package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.package-artifact.outputs.artifact-id }}
          path: ${{ runner.temp }}/package

      - name: Prepare isolated bare consumer
        run: >-
          node scripts/smoke-packed.mjs
          --consumer native
          --archive "$RUNNER_TEMP/package/chessboard-native.tgz"
          --destination "$RUNNER_TEMP/packed-native"

      - name: Set up Ruby and gems
        id: ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1
        with:
          ruby-version: '3.2.11'
          bundler-cache: true
          working-directory: ${{ runner.temp }}/packed-native

      - name: Install CocoaPods dependencies
        working-directory: ${{ runner.temp }}/packed-native
        run: ${{ steps.ruby.outputs.ruby-prefix }}/bin/bundle exec pod install --project-directory=ios

      - name: Build iOS Release harness
        working-directory: ${{ runner.temp }}/packed-native
        run: npm run ios:release

      - name: Run iOS accessibility audit
        working-directory: ${{ runner.temp }}/packed-native
        run: npm run ios:accessibility

      - name: Upload iOS accessibility audit results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-accessibility-audit
          path: ${{ runner.temp }}/packed-native/ios/build/ChessboardNativeHarnessAccessibility.xcresult
          if-no-files-found: ignore
          retention-days: 7

  ci-gate:
    name: CI gate
    if: ${{ always() }}
    needs:
      - baseline
      - package-artifact
      - packed-expo
      - packed-bare-android
      - packed-bare-ios
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      BASELINE_RESULT: ${{ needs.baseline.result }}
      PACKAGE_ARTIFACT_RESULT: ${{ needs.package-artifact.result }}
      PACKED_EXPO_RESULT: ${{ needs.packed-expo.result }}
      PACKED_BARE_ANDROID_RESULT: ${{ needs.packed-bare-android.result }}
      PACKED_BARE_IOS_RESULT: ${{ needs.packed-bare-ios.result }}

    steps:
      - name: Require every CI job to succeed
        shell: bash
        run: |
          failed=0

          for variable in \
            BASELINE_RESULT \
            PACKAGE_ARTIFACT_RESULT \
            PACKED_EXPO_RESULT \
            PACKED_BARE_ANDROID_RESULT \
            PACKED_BARE_IOS_RESULT
          do
            result="${!variable}"

            if [[ "$result" != "success" ]]; then
              echo "$variable was $result"
              failed=1
            fi
          done

          exit "$failed"
