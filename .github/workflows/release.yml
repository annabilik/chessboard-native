name: npm prerelease

on:
  workflow_dispatch:
    inputs:
      expected-version:
        description: Exact prerelease version from packages/chessboard-native/package.json
        required: true
        type: string
      mode:
        description: Validate only, bootstrap with an npm token, or use npm trusted publishing
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - bootstrap-token
          - trusted-oidc

permissions:
  contents: read

concurrency:
  group: npm-prerelease
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare exact package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: 1
      EXPO_NO_TELEMETRY: 1
      EXPECTED_VERSION: ${{ inputs['expected-version'] }}

    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
      digest: ${{ steps.metadata.outputs.digest }}
      version: ${{ steps.metadata.outputs.version }}

    steps:
      - name: Require the main branch
        env:
          RELEASE_REF: ${{ github.ref }}
        run: |
          if [[ "$RELEASE_REF" != "refs/heads/main" ]]; then
            echo "Prereleases may only be prepared from refs/heads/main." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Require an npm CLI with trusted publishing support
        run: |
          npm_version="$(npm --version)"
          node -e \
            "const [major, minor, patch] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) { console.error('npm 11.5.1 or newer is required'); process.exit(1); }" \
            "$npm_version"
          echo "Using npm $npm_version"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the full verification suite
        run: pnpm verify

      - name: Validate prerelease metadata
        run: >-
          node scripts/check-prerelease.mjs
          --expected-version "$EXPECTED_VERSION"

      - name: Build and inspect the release archive
        env:
          RELEASE_ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: node scripts/inspect-package.mjs --output "$RELEASE_ARCHIVE"

      - name: Prepare isolated consumers from the release archive
        env:
          RELEASE_ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: |
          node scripts/smoke-packed.mjs \
            --consumer expo \
            --archive "$RELEASE_ARCHIVE" \
            --destination "$RUNNER_TEMP/release-expo"
          node scripts/smoke-packed.mjs \
            --consumer native \
            --archive "$RELEASE_ARCHIVE" \
            --destination "$RUNNER_TEMP/release-native"

      - name: Type-check the isolated Expo consumer
        working-directory: ${{ runner.temp }}/release-expo
        run: npm run typecheck

      - name: Export the isolated Expo consumer
        working-directory: ${{ runner.temp }}/release-expo
        run: npm run export:native

      - name: Type-check the isolated bare consumer
        working-directory: ${{ runner.temp }}/release-native
        run: npm run typecheck

      - name: Record exact package metadata
        id: metadata
        env:
          RELEASE_ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: |
          archive_version="$({ tar -xOf "$RELEASE_ARCHIVE" package/package.json; } | node -e \
            "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version));")"
          if [[ "$archive_version" != "$EXPECTED_VERSION" ]]; then
            echo "Archive version $archive_version does not match expected version $EXPECTED_VERSION." >&2
            exit 1
          fi

          digest="$(sha256sum "$RELEASE_ARCHIVE" | cut -d ' ' -f 1)"
          echo "version=$archive_version" >> "$GITHUB_OUTPUT"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Upload the exact inspected package
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: chessboard-native-prerelease
          path: ${{ runner.temp }}/package/chessboard-native.tgz
          compression-level: 0
          if-no-files-found: error
          retention-days: 7

  dry-run:
    name: npm publish dry run
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      EXPECTED_DIGEST: ${{ needs.prepare.outputs.digest }}
      EXPECTED_VERSION: ${{ needs.prepare.outputs.version }}
      PACKAGE_NAME: '@vibechess/chessboard-native'

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Download the exact inspected package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.prepare.outputs.artifact-id }}
          path: ${{ runner.temp }}/package

      - name: Verify downloaded package identity
        env:
          ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: |
          actual_digest="$(sha256sum "$ARCHIVE" | cut -d ' ' -f 1)"
          if [[ "$actual_digest" != "$EXPECTED_DIGEST" ]]; then
            echo "Downloaded archive digest does not match the prepared archive." >&2
            exit 1
          fi

          archive_version="$({ tar -xOf "$ARCHIVE" package/package.json; } | node -e \
            "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version));")"
          if [[ "$archive_version" != "$EXPECTED_VERSION" ]]; then
            echo "Downloaded archive version $archive_version does not match $EXPECTED_VERSION." >&2
            exit 1
          fi

          if published_version="$(npm view "$PACKAGE_NAME@$EXPECTED_VERSION" version 2>/dev/null)"; then
            echo "$PACKAGE_NAME@$published_version already exists and cannot be republished." >&2
            exit 1
          fi

      - name: Dry-run publication
        env:
          ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: npm publish "$ARCHIVE" --dry-run --access public --tag next

  publish:
    name: Publish npm prerelease
    if: ${{ inputs.mode == 'bootstrap-token' || inputs.mode == 'trusted-oidc' }}
    needs:
      - prepare
      - dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm

    permissions:
      contents: read
      id-token: write

    env:
      EXPECTED_DIGEST: ${{ needs.prepare.outputs.digest }}
      EXPECTED_VERSION: ${{ needs.prepare.outputs.version }}
      EXPO_NO_TELEMETRY: 1
      PACKAGE_NAME: '@vibechess/chessboard-native'

    steps:
      - name: Require the main branch
        env:
          RELEASE_REF: ${{ github.ref }}
        run: |
          if [[ "$RELEASE_REF" != "refs/heads/main" ]]; then
            echo "Prereleases may only be published from refs/heads/main." >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org

      - name: Require an npm CLI with trusted publishing support
        run: |
          npm_version="$(npm --version)"
          node -e \
            "const [major, minor, patch] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) { console.error('npm 11.5.1 or newer is required'); process.exit(1); }" \
            "$npm_version"
          echo "Using npm $npm_version"

      - name: Download the exact inspected package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.prepare.outputs.artifact-id }}
          path: ${{ runner.temp }}/package

      - name: Verify package identity before publication
        env:
          ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: |
          actual_digest="$(sha256sum "$ARCHIVE" | cut -d ' ' -f 1)"
          if [[ "$actual_digest" != "$EXPECTED_DIGEST" ]]; then
            echo "Downloaded archive digest does not match the prepared archive." >&2
            exit 1
          fi

          archive_version="$({ tar -xOf "$ARCHIVE" package/package.json; } | node -e \
            "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).version));")"
          if [[ "$archive_version" != "$EXPECTED_VERSION" ]]; then
            echo "Downloaded archive version $archive_version does not match $EXPECTED_VERSION." >&2
            exit 1
          fi

          if published_version="$(npm view "$PACKAGE_NAME@$EXPECTED_VERSION" version 2>/dev/null)"; then
            echo "$PACKAGE_NAME@$published_version already exists and cannot be republished." >&2
            exit 1
          fi

      - name: Publish with the bootstrap npm token
        if: ${{ inputs.mode == 'bootstrap-token' }}
        env:
          ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "The npm environment must provide NPM_TOKEN for bootstrap-token mode." >&2
            exit 1
          fi
          npm publish "$ARCHIVE" --access public --tag next --provenance

      - name: Publish with npm trusted publishing
        if: ${{ inputs.mode == 'trusted-oidc' }}
        env:
          ARCHIVE: ${{ runner.temp }}/package/chessboard-native.tgz
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" || -n "${NPM_TOKEN:-}" ]]; then
            echo "trusted-oidc mode must not receive an npm token." >&2
            exit 1
          fi
          npm publish "$ARCHIVE" --access public --tag next --provenance

      - name: Wait for the exact version and next tag
        run: |
          observed_version=""
          next_version=""
          for attempt in {1..20}; do
            observed_version="$(npm view "$PACKAGE_NAME@$EXPECTED_VERSION" version 2>/dev/null || true)"
            next_version="$(npm view "$PACKAGE_NAME@next" version 2>/dev/null || true)"
            if [[ "$observed_version" == "$EXPECTED_VERSION" && "$next_version" == "$EXPECTED_VERSION" ]]; then
              break
            fi
            echo "Registry has not exposed the exact version and next tag yet (attempt $attempt/20)."
            sleep 15
          done

          if [[ "$observed_version" != "$EXPECTED_VERSION" ]]; then
            echo "Registry did not expose the published prerelease in time." >&2
            exit 1
          fi

          if [[ "$next_version" != "$EXPECTED_VERSION" ]]; then
            echo "dist-tags.next is $next_version, expected $EXPECTED_VERSION." >&2
            exit 1
          fi

          latest_version="$(npm view "$PACKAGE_NAME@latest" version 2>/dev/null || true)"
          if [[ "$latest_version" == "$EXPECTED_VERSION" ]]; then
            echo "The prerelease must not be assigned to dist-tags.latest." >&2
            exit 1
          fi

      - name: Require registry provenance metadata
        run: |
          attestations_file="$RUNNER_TEMP/registry-attestations.json"
          has_attestation=false
          for attempt in {1..12}; do
            if ! npm view "$PACKAGE_NAME@$EXPECTED_VERSION" dist.attestations --json > "$attestations_file"; then
              : > "$attestations_file"
            fi
            if node -e \
              "const fs=require('node:fs'); let value; try { value=JSON.parse(fs.readFileSync(process.env.ATTESTATIONS_FILE, 'utf8')); } catch { process.exit(1); } if (typeof value?.url !== 'string' || typeof value?.provenance?.predicateType !== 'string') process.exit(1);"; then
              has_attestation=true
              break
            fi
            echo "Registry has not exposed provenance metadata yet (attempt $attempt/12)."
            sleep 10
          done

          if [[ "$has_attestation" != "true" ]]; then
            echo "Published package has no usable provenance attestation metadata." >&2
            exit 1
          fi
        env:
          ATTESTATIONS_FILE: ${{ runner.temp }}/registry-attestations.json

      - name: Download and verify the registry tarball
        id: registry-package
        run: |
          registry_directory="$RUNNER_TEMP/registry-package"
          mkdir -p "$registry_directory"
          npm pack "$PACKAGE_NAME@$EXPECTED_VERSION" --pack-destination "$registry_directory" --json > "$RUNNER_TEMP/npm-pack.json"

          mapfile -t registry_archives < <(find "$registry_directory" -maxdepth 1 -type f -name '*.tgz' -print)
          if [[ "${#registry_archives[@]}" -ne 1 ]]; then
            echo "Expected exactly one registry tarball, found ${#registry_archives[@]}." >&2
            exit 1
          fi

          registry_archive="${registry_archives[0]}"
          registry_digest="$(sha256sum "$registry_archive" | cut -d ' ' -f 1)"
          if [[ "$registry_digest" != "$EXPECTED_DIGEST" ]]; then
            echo "Registry tarball digest does not match the published archive." >&2
            exit 1
          fi

          echo "archive=$registry_archive" >> "$GITHUB_OUTPUT"

      - name: Prepare isolated consumers from the registry tarball
        env:
          REGISTRY_ARCHIVE: ${{ steps.registry-package.outputs.archive }}
        run: |
          node scripts/smoke-packed.mjs \
            --consumer expo \
            --archive "$REGISTRY_ARCHIVE" \
            --destination "$RUNNER_TEMP/registry-expo"
          node scripts/smoke-packed.mjs \
            --consumer native \
            --archive "$REGISTRY_ARCHIVE" \
            --destination "$RUNNER_TEMP/registry-native"

      - name: Type-check the registry-installed Expo consumer
        working-directory: ${{ runner.temp }}/registry-expo
        run: npm run typecheck

      - name: Export the registry-installed Expo consumer
        working-directory: ${{ runner.temp }}/registry-expo
        run: npm run export:native

      - name: Type-check the registry-installed bare consumer
        working-directory: ${{ runner.temp }}/registry-native
        run: npm run typecheck
